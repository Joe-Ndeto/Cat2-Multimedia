<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Our Wildlife</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <main class="container">

        <h1>Save Our Wildlife!</h1>

        <video id="wildlifeVideo" controls>

        <p>

        <button id="toggleBtn">

        </button>

    </main>

    <script src="script.js"></script>

</body>
</html>
